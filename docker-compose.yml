version: '3'

services:

  app:
    build: .
    container_name: php_app
    ports:
      - "8080:80"
    depends_on:
      - mysql_db

  mysql_db:
    image: mysql:8
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nextgen_db
    ports:
      - "3306:3306"
