version: "3.8"

services:

  app:
    build: .
    container_name: nextgen_app
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - .:/var/www/html

  db:
    image: mysql:8.0
    container_name: nextgen_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: nextgen_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: Str0ngP@ssw0rd!2026
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  dbdata:
